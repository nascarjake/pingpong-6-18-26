<html><head><title>Open Seas</title><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#78c7ff;font-family:Georgia,serif;color:#fff}

</style></head><body><div id="hud"></div><div id="end"></div><div id="ctl"><button id="left">LEFT</button><button id="right">RIGHT</button><button id="fish">FISH</button></div><div id="vignette"></div>
<script type="module">

function hull(color=0x6b3119){let g=new THREE.Group(),wood=new THREE.MeshStandardMaterial({color,roughness:.8}),cloth=new THREE.MeshStandardMaterial({color:0xf6ead0,side:2,roughness:.9}),base=new THREE.Mesh(new THREE.BoxGeometry(6.2,1.4,11),wood),bow=new THREE.Mesh(new THREE.ConeGeometry(3.1,4,4),wood),deck=new THREE.Mesh(new THREE.BoxGeometry(5, .35,8),new THREE.MeshStandardMaterial({color:0x9b6a3a,roughness:.75})),cabin=new THREE.Mesh(new THREE.BoxGeometry(2.4,1.1,2.2),new THREE.MeshStandardMaterial({color:0xc79a58,roughness:.7})),mast=new THREE.Mesh(new THREE.CylinderGeometry(.16,.22,8),new THREE.MeshStandardMaterial({color:0x2b160d})),sail=new THREE.Mesh(new THREE.ConeGeometry(2.9,5,3),cloth),spar=new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,5.6),new THREE.MeshStandardMaterial({color:0x2b160d}));base.position.y=1;bow.position.set(0,1,6.8);bow.rotation.x=Math.PI/2;deck.position.y=1.9;cabin.position.set(0,2.65,-2.2);mast.position.y=5;sail.position.set(0,5.2,-.4);sail.rotation.y=Math.PI/2;spar.position.set(0,4.6,-.2);spar.rotation.z=Math.PI/2;g.add(base,bow,deck,cabin,mast,sail,spar);return g}
function island(x,z,s=1){let g=new THREE.Group(),sand=new THREE.Mesh(new THREE.CylinderGeometry(8*s,11*s,2,16),new THREE.MeshStandardMaterial({color:0xd9bd74})),hill=new THREE.Mesh(new THREE.ConeGeometry(6*s,8*s,18),new THREE.MeshStandardMaterial({color:0x2c8b4b}));sand.position.y=.6;hill.position.y=5;g.add(sand,hill);for(let i=0;i<3;i++){let palm=new THREE.Mesh(new THREE.CylinderGeometry(.18*s,.28*s,5*s),new THREE.MeshStandardMaterial({color:0x76502b})),leaf=new THREE.Mesh(new THREE.ConeGeometry(2*s,3*s,5),new THREE.MeshStandardMaterial({color:0x167044}));palm.position.set((i-1)*3*s,3*s,2*s);leaf.position.copy(palm.position).add(new THREE.Vector3(0,3*s,0));g.add(palm,leaf)}g.position.set(x,0,z);g.userData.treasure=1;scene.add(g);return g}
const player=hull(0x74361d);player.position.y=1.2;scene.add(player);renderer.domElement.tabIndex=0;renderer.domElement.focus();let speed=0,turn=0,heading=0,treasure=0,islandGold=0,shipGold=0,fishGold=0,fishCaught=0,hullHp=100,cool=0,fishCool=0,zoom=28,lastKey='',fireFlash=0,msg='',done=0,keys={};
const islands=Array.from({length:3+level},(_,i)=>{let a=i*6.28/(3+level)+.6,r=58+level*8+(i%2)*32;return island(Math.cos(a)*r,Math.sin(a)*r,.85+(i%3)*.15)});
const enemies=Array.from({length:3+level},(_,i)=>{let a=i*6.28/(3+level)+2.1,r=50+level*10+(i%2)*30,e=hull(0x1f252f);e.position.set(Math.cos(a)*r,1.2,Math.sin(a)*r);e.userData={hp:3,cool:0};scene.add(e);return e});
const maxFish=3+level,maxTreasure=islands.length*25+enemies.length*90+maxFish*15;
const shots=[];function ball(from,dir,bad=0){let b=new THREE.Mesh(new THREE.SphereGeometry(bad?.45:.65,12,12),new THREE.MeshStandardMaterial({color:bad?0xff4e34:0x15120f,emissive:bad?0x220000:0x000000}));b.position.copy(from).add(dir.clone().multiplyScalar(8)).add(new THREE.Vector3(0,2.2,0));b.userData={vx:dir.x*42,vz:dir.z*42,life:3,bad,hit:1};shots.push(b);scene.add(b)}
function splash(p){let r=new THREE.Mesh(new THREE.RingGeometry(.5,2.8,22),new THREE.MeshBasicMaterial({color:0xbdefff,transparent:true,opacity:.8,side:2}));r.rotation.x=-Math.PI/2;r.position.copy(p);r.userData.life=.45;shots.push(r);scene.add(r)}
function fishPop(p){let f=new THREE.Mesh(new THREE.ConeGeometry(1.2,3.8,4),new THREE.MeshBasicMaterial({color:0x35d0ff}));f.position.copy(p).add(new THREE.Vector3(0,4,0));f.rotation.z=Math.PI/2;f.userData.life=2.2;shots.push(f);scene.add(f)}
function coin(n){let c=document.createElement('canvas'),x=c.getContext('2d');c.width=128;c.height=64;x.font='700 34px Georgia';x.fillStyle='#ffd94a';x.strokeStyle='#5a3100';x.lineWidth=5;x.strokeText('+'+n,24,42);x.fillText('+'+n,24,42);let s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true}));s.position.copy(player.position).add(new THREE.Vector3(0,7,0));s.scale.set(7,3.5,1);s.userData={life:1.1,float:1};shots.push(s);scene.add(s)}
function trace(a,b){let l=new THREE.Line(new THREE.BufferGeometry().setFromPoints([a,b]),new THREE.LineBasicMaterial({color:0xffee55}));l.userData.life=.18;shots.push(l);scene.add(l)}
renderer.domElement.addEventListener('pointerdown',()=>renderer.domElement.focus());
let L=document.querySelector('#left'),R=document.querySelector('#right'),F=document.querySelector('#fish');L.onpointerdown=()=>keys.left=1;L.onpointerup=L.onpointerleave=()=>keys.left=0;R.onpointerdown=()=>keys.right=1;R.onpointerup=R.onpointerleave=()=>keys.right=0;F.onclick=()=>fishCool<=0&&fish();
function hit(e,p){e.userData.hp--;treasure+=10;shipGold+=10;coin(10);msg=`Hit! ${Math.max(0,e.userData.hp)} hp`;splash(p);if(e.userData.hp<=0){treasure+=60;shipGold+=60;coin(60);msg='Sunk!';e.visible=false}}
function fire(){let dir=new THREE.Vector3(Math.sin(heading),0,Math.cos(heading));ball(player.position,dir);msg='Fire!';fireFlash=.25;cool=.55}
function input(e,on){let k=e.key.toLowerCase(),c=e.code;lastKey=c;if(c==='KeyR'){done===2?location.search='?level='+(level+1):location.reload()}if(done)return;if(['KeyW','KeyA','KeyS','KeyD','KeyE','ArrowUp','ArrowLeft','ArrowDown','ArrowRight','Space','KeyF'].includes(c))e.preventDefault();if(k==='w'||c==='ArrowUp')keys.up=on;if(k==='s'||c==='ArrowDown')keys.down=on;if(k==='a'||c==='ArrowLeft')keys.left=on;if(k==='d'||c==='ArrowRight')keys.right=on;if(on&&(k==='e'||c==='KeyE')&&fishCool<=0)fish();if(c==='Space'||k==='f')keys.fire=on}
addEventListener('keydown',e=>input(e,1));addEventListener('keyup',e=>input(e,0));addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
addEventListener('wheel',e=>{zoom=Math.max(8,Math.min(34,zoom+e.deltaY*.025));e.preventDefault()},{passive:false});
function fish(){if(zoom>14){msg='Zoom closer to fish';return}if(fishCaught>=maxFish){msg='No fish left';return}let p=player.position.clone().add(new THREE.Vector3(Math.sin(heading)*5,0,Math.cos(heading)*5));treasure+=15;fishGold+=15;coin(15);fishCaught++;msg=`Caught fish ${fishCaught}/${maxFish}! +15`;fishCool=1.8;splash(p);fishPop(p)}
function tick(){let dt=Math.min(clock.getDelta(),.033),t=clock.elapsedTime;if(!done){speed+=(keys.up?0.12:0);speed-=(keys.down?0.08:0);speed*=.965;turn=(keys.left?1:0)-(keys.right?1:0);heading+=turn*.09;player.quaternion.setFromAxisAngle(new THREE.Vector3(0,1,0),heading);player.position.x+=Math.sin(heading)*speed+turn*.45;player.position.z+=Math.cos(heading)*speed;if(keys.fire&&cool<=0)fire();if(keys.fish&&fishCool<=0)fish();if(hullHp<=0){done=1;msg='Wrecked! Press R'}if(!enemies.some(e=>e.userData.hp>0)){done=2;msg='Victory! Press R'}}player.position.y=1.15+Math.sin(t*3)*.18;cool-=dt;fishCool-=dt;fireFlash-=dt;
for(let i=0;i<seaPos.count;i++){let x=seaPos.getX(i),y=seaPos.getY(i);seaPos.setZ(i,Math.sin(x*.08+t*1.4)*.85+Math.cos(y*.1+t*1.1)*.55+Math.sin((x+y)*.18+t*2.6)*.18+Math.cos((x-y)*.045+t*.7)*.35)}seaGeo.computeVertexNormals();seaPos.needsUpdate=true;seaMat.color.setHSL(.53,.85,.28+Math.sin(t*.25)*.03);
for(let i=0;i<foamPos.count;i++){let x=foamPos.getX(i),y=foamPos.getY(i);foamPos.setZ(i,Math.sin(x*.11+t*1.8)*.35+Math.cos(y*.15+t*1.4)*.22)}ft.offset.set(t*.015,t*.01);foamPos.needsUpdate=true;
islands.forEach(i=>{if(i.userData.treasure&&i.position.distanceTo(player.position)<15){treasure+=25;islandGold+=25;coin(25);i.userData.treasure=0;i.scale.setScalar(.86)}});
enemies.forEach(e=>{if(e.userData.hp<=0)return;let to=player.position.clone().sub(e.position),d=to.length(),dir=to.normalize();e.lookAt(player.position.x,1.2,player.position.z);e.position.addScaledVector(dir,Math.min(.08,d*.0009));e.userData.cool-=dt;if(d<48&&e.userData.cool<=0){ball(e.position,dir,1);e.userData.cool=1.7}});
shots.slice().forEach(s=>{s.userData.life-=dt;if(s.userData.float)s.position.y+=dt*3;if(s.userData.vx!==undefined){s.position.x+=s.userData.vx*dt;s.position.z+=s.userData.vz*dt}if(s.userData.bad&&s.position.distanceTo(player.position)<4){hullHp-=8;splash(s.position);s.userData.life=0}enemies.forEach(e=>{if(s.userData.hit&&!s.userData.bad&&e.userData.hp>0&&s.position.distanceTo(e.position)<7){hit(e,s.position);s.userData.life=0}});if(s.userData.life<=0){scene.remove(s);shots.splice(shots.indexOf(s),1)}});

hud.innerHTML=`Level ${level}<br>Treasure ${treasure}<br>Fish ${fishCaught}/${maxFish}<br>Hull ${Math.max(0,Math.round(hullHp))}<br>Enemy ships ${enemies.filter(e=>e.userData.hp>0).length}<br>${msg||'Ready'}<br>${zoom<14?'Fishing ready':'Zoom closer'} ${fishCool>0?fishCool.toFixed(1):'E/FISH'}`;let stars='★★★★★☆☆☆☆☆'.slice(5-Math.ceil(Math.min(1,treasure/maxTreasure)*5),10-Math.ceil(Math.min(1,treasure/maxTreasure)*5)),islandCount=islands.filter(i=>!i.userData.treasure).length,shipCount=enemies.filter(e=>e.userData.hp<=0).length;end.style.display=done?'grid':'none';end.innerHTML=`${msg}<br>${stars}<br><span style="font-size:24px">Islands ${islandCount}/${islands.length}: ${islandGold}/${islands.length*25}<br>Ships ${shipCount}/${enemies.length}: ${shipGold}/${enemies.length*90}<br>Fish ${fishCaught}/${maxFish}: ${fishGold}/${maxFish*15}<br>Total ${treasure}/${maxTreasure}<br>Press R to ${done===2?'continue':'retry'}</span>`;renderer.render(scene,camera);requestAnimationFrame(tick)}
tick();
</script></body></html>
